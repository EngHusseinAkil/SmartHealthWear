pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // Samsung Health SDK repository
        maven { url 'https://maven.pkg.github.com/samsung-health/data-sdk' }
        // MPAndroidChart
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "HealthMonitor"
include ':app'
include ':wear'
